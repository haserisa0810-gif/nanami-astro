<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title }}</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f6f4f1;color:#111;margin:0}
    .wrap{max-width:1080px;margin:32px auto;padding:0 16px}
    .card{background:#fff;border:1px solid #e7e1d9;border-radius:18px;padding:24px;box-shadow:0 8px 24px rgba(0,0,0,.05);margin-bottom:18px}
    h1,h2,h3{margin:0 0 12px}
    .muted{color:#666}
    .row{display:flex;gap:12px;flex-wrap:wrap}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
    input,textarea,select{width:100%;padding:10px 12px;border:1px solid #d7d1c8;border-radius:10px;background:#fff;box-sizing:border-box}
    input[type="checkbox"],input[type="radio"]{width:auto;padding:0;border:0;border-radius:0;background:transparent;box-sizing:border-box;accent-color:#111;flex:0 0 auto}
    textarea{min-height:120px}
    button,.btn{display:inline-block;background:#111;color:#fff;border:0;border-radius:10px;padding:10px 16px;text-decoration:none;cursor:pointer}
    button.danger,.btn.danger{background:#dc3545;color:#fff}
    .btn.secondary,button.secondary{background:#fff;color:#111;border:1px solid #d7d1c8}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px 8px;border-bottom:1px solid #eee;vertical-align:top;text-align:left}
    .pill{display:inline-block;padding:4px 10px;border-radius:999px;background:#f2efe9;font-size:12px}.pill.danger{background:#dc3545;color:#fff}.pill.warning{background:#f0ad4e;color:#fff}.pill.success{background:#28a745;color:#fff}.pill.secondary{background:#6c757d;color:#fff}
    .topnav{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
    .error{padding:12px 14px;background:#fff3f3;border:1px solid #edcaca;border-radius:12px;color:#8d2f2f;margin-bottom:14px}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
    .stat{background:#faf8f5;border:1px solid #eee2d5;border-radius:16px;padding:16px}
    .code{font-family:ui-monospace,SFMono-Regular,monospace;background:#faf8f5;border:1px solid #eee2d5;border-radius:8px;padding:2px 6px}
    .table-scroll{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
    .mobile-only{display:none !important}
    .desktop-only{display:block !important}
    .mobile-list{display:grid;gap:12px}
    .mobile-item{border:1px solid #e7e1d9;border-radius:14px;padding:14px;background:#fff}
    .mobile-item .label{font-size:12px;color:#666;margin-bottom:2px}
    .mobile-item .value{font-size:14px;word-break:break-word}

    .filter-form{display:grid;gap:14px;margin:16px 0 18px}
    .filter-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
    .filter-grid-4{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
    .filter-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .section-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
    .result-count{font-size:14px;color:#666;background:#faf8f5;border:1px solid #eee2d5;border-radius:999px;padding:8px 12px}
    .mobile-grid{display:grid;grid-template-columns:92px 1fr;gap:8px 12px;align-items:start}
    @media (max-width: 768px){
      .wrap{margin:16px auto;padding:0 12px}
      .card{padding:16px;border-radius:16px}
      h1{font-size:32px;line-height:1.2}
      h2{font-size:24px;line-height:1.25}
      h3{font-size:20px;line-height:1.3}
      .topnav{gap:8px}
      button,.btn{padding:10px 14px}
      .stats{grid-template-columns:repeat(2,minmax(0,1fr))}
      .table-scroll table{min-width:720px}
      .desktop-only{display:none !important}
      .mobile-only{display:block !important}
      .mobile-grid{grid-template-columns:86px 1fr;gap:8px 10px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
